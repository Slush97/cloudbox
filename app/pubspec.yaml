name: cloudbox
description: Self-hosted cloud — photos, files, search.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_map: ^7.0.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  mobile_scanner: ^6.0.0
  latlong2: ^0.9.0
  path_provider: ^2.1.5
  photo_manager: ^3.6.3
  riverpod_annotation: ^2.6.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  video_player: ^2.9.4
  shared_preferences: ^2.3.4
  workmanager: ^0.9.0

dev_dependencies:
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.3
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
