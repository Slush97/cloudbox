## Silo — self-hosted personal cloud
##
## Quick start:
##   1. Copy .env.example to .env.prod, fill in JWT_SECRET, DB_PASSWORD, DOMAIN
##   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: silo
      POSTGRES_USER: silo
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.prod or environment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  silo:
    image: ghcr.io/slush97/silo:main
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://silo:${DB_PASSWORD}@postgres:5432/silo
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod or environment}
      STORAGE_PATH: /app/data
      SILO_HOST: 0.0.0.0
      SILO_PORT: "3000"
    volumes:
      - silo_data:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - silo
    restart: unless-stopped

volumes:
  pgdata:
  silo_data:
  caddy_data:
  caddy_config:
