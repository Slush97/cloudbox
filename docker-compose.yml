services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cloudbox
      POSTGRES_USER: cloudbox
      POSTGRES_PASSWORD: cloudbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cloudbox
      MINIO_ROOT_PASSWORD: cloudbox123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  minio_data:
